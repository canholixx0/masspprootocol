<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mass Protocol Web Dashboard</title>
    <!-- SADECE Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#0a0a0a',
                        panel: '#131316',
                        accent: '#00E676',
                        borderC: '#27272A',
                    }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #27272A;
            border-radius: 4px;
        }

        /* SHADCN SPOTLIGHT CARD EFEKTİ (SAF CSS & VANILLA JS PORTU) */
        :root {
            --x: 0;
            --y: 0;
        }

        [data-glow] {
            --border-size: 2px;
            --spotlight-size: 300px;
            --glow-color: rgba(0, 230, 118, 0.5);
            /* Default Neon Yesil */
            position: relative;
            transform: translateZ(0);
            border-radius: inherit;
        }

        [data-glow]::before,
        [data-glow]::after {
            content: "";
            position: absolute;
            inset: calc(var(--border-size) * -1);
            border: var(--border-size) solid transparent;
            border-radius: inherit;
            background-attachment: fixed;
            background-position: 50% 50%;
            mask: linear-gradient(transparent, transparent), linear-gradient(white, white);
            mask-clip: padding-box, border-box;
            mask-composite: intersect;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 50;
        }

        /* Fare üzerine geldiğinde çizgiler ışıldasın */
        [data-glow]:hover::before,
        [data-glow]:hover::after {
            opacity: 1;
        }

        [data-glow]::before {
            background-image: radial-gradient(var(--spotlight-size) var(--spotlight-size) at calc(var(--x, 0) * 1px) calc(var(--y, 0) * 1px),
                    var(--glow-color), transparent 100%);
        }

        /* İsteğe Bağlı Parıltı Renkleri */
        [data-glow="red"] {
            --glow-color: rgba(239, 68, 68, 0.8);
        }

        [data-glow="blue"] {
            --glow-color: rgba(96, 165, 250, 0.8);
        }

        [data-glow="green"] {
            --glow-color: rgba(0, 230, 118, 0.8);
        }

        [data-glow="panel"] {
            --glow-color: rgba(255, 255, 255, 0.15);
            --spotlight-size: 600px;
        }
    </style>
</head>

<body
    class="bg-background text-white min-h-screen overflow-hidden antialiased font-sans selection:bg-accent selection:text-black">
    <div id="root" class="h-screen w-full flex">
        <div
            class="flex w-full h-full items-center justify-center font-bold text-[#71717A] text-2xl tracking-[0.3em] uppercase animate-pulse">
            Bağlantı Kuruluyor...
        </div>
    </div>

    <script>
        // FARE TAKIPÇİSİ (SPOTLIGHT İÇİN)
        document.addEventListener('pointermove', e => {
            document.documentElement.style.setProperty('--x', e.clientX);
            document.documentElement.style.setProperty('--y', e.clientY);
        });

        // STATE
        let schedule = null;
        let stats = null;
        let currentDate = new Date();
        let selectedDateStr = "";
        let cardioChoice = "";
        let now = new Date();
        let actionLoading = false;

        const MONTH_NAMES = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
        const DAY_NAMES = ["PZT", "SAL", "ÇAR", "PER", "CUM", "CMT", "PAZ"];
        const todayStr = now.toISOString().split('T')[0];

        setInterval(() => { now = new Date(); renderApp(); }, 60000);

        // FETCH DATA
        // retries=50 demek: 50 defa 200ms arayla (Toplam 10 saniye) dener
        // Bu sayede .bat dosyasına tıklamaktan sunucunun ayağa kalkmasına kadar olan aralığı bekler, "hemen" hata vermez.
        async function fetchData(retries = 50) {
            try {
                const res = await fetch('http://127.0.0.1:18444/api/data');
                if (!res.ok) throw new Error("Sunucu meşgul veya yok.");
                const json = await res.json();
                schedule = json.data.schedule;
                stats = json.stats;

                let focusDate = todayStr;
                const todayData = schedule.find(d => d.date === todayStr);
                if (!todayData) {
                    const nextPending = schedule.find(d => d.is_active && !d.completed);
                    if (nextPending) focusDate = nextPending.date;
                }
                selectedDateStr = focusDate;
                if (focusDate) {
                    const fd = new Date(focusDate);
                    currentDate = new Date(fd.getFullYear(), fd.getMonth(), 1);
                }
                renderApp();
            } catch (e) {
                // AJAN 6: Dosyadan Açma İzolasyonu (Eğer index.html protokolü file:// ise)
                if (window.location.protocol === 'file:') {
                    document.getElementById('root').innerHTML = `
                <div class='flex w-full h-full flex-col justify-center items-center text-center bg-[#0a0a0a] gap-6'>
                    <div class='text-[#EF4444] text-5xl font-black tracking-widest'>⚠️ DURUN! ⚠️</div>
                    <div class='text-gray-300 text-2xl font-bold max-w-3xl leading-relaxed'>
                        Şu an <span class='text-accent'>index.html</span> dosyasına çift tıklayarak giriş yaptınız.<br>
                        Bu şekilde veri tabanı ve mantık (Python motoru) ÇALIŞMAZ!
                    </div>
                    <div class='bg-[#2E1010] border border-[#EF4444] p-6 rounded-2xl'>
                        Lütfen bu sekmeyi kapatın ve klasörünüzdeki<br>
                        <span class='text-[#00E676] text-3xl font-black'>WEB_TAKVIMI_AC.bat</span><br>dosyasına tıklayarak açın.
                    </div>
                </div>`;
                    return;
                }

                // Dosyadan açılmadıysa 10 saniye boyunca denemeye devam et
                if (retries > 0) setTimeout(() => fetchData(retries - 1), 200);
                else {
                    document.getElementById('root').innerHTML = `
                <div class='flex w-full h-full flex-col justify-center items-center text-center bg-[#0a0a0a] gap-6 p-8'>
                    <div class='text-[#EF4444] text-4xl font-black tracking-widest'>BAĞLANTI ZAMAN AŞIMI</div>
                    <div class='text-gray-400 text-xl font-bold max-w-2xl leading-relaxed'>
                        Tarayıcınız 10 saniye boyunca masaüstünüzdeki sunucunun hazır olmasını bekledi ancak sunucu motoru uyanamadı.
                    </div>
                    <div class='bg-[#131316] border border-[#27272A] p-6 rounded-2xl text-left'>
                        <div class='text-accent font-bold mb-2'>Neden Olabilir?</div>
                        <ul class='list-disc pl-5 text-gray-400 space-y-2'>
                            <li>Önceki denemede arkada açık kalan bir Python / CMD ekranı takılı kalmış olabilir (Görev yöneticisinden kapatın).</li>
                            <li>Sisteminizde Python düzgün çalışmıyor olabilir.</li>
                            <li>Ekranda açılan siyah konsol ekranını siz veya bir virüs programı engellemiş olabilir.</li>
                        </ul>
                    </div>
                    <button onclick="window.location.reload()" class='border border-gray-600 px-8 py-4 rounded-xl font-bold text-gray-300 hover:text-white hover:bg-gray-800 transition-colors uppercase tracking-widest'>Tekrar Dene</button>
                </div>`;
                }
            }
        }

        async function handleAction(action, identifier) {
            const dayInfo = schedule.find(d => d.date === selectedDateStr);
            if (action === 'complete' && dayInfo.type === 'E' && !cardioChoice) {
                alert("Lütfen önce kardiyo türünüzü seçin!"); return;
            }
            if (action === 'clear_future') {
                if (!confirm("Bugünden itibaren olan ileriki günler için işaretlediğiniz TÜM ONARIMLAR sıfırlanacaktır. Onaylıyor musunuz?")) return;
            }

            actionLoading = true;
            renderApp();

            const payload = action === 'skip' ? { action, date_str: identifier } :
                action === 'clear_future' ? { action } :
                    { action, day_id: identifier, cardio: cardioChoice };

            try {
                const res = await fetch('http://127.0.0.1:18444/api/action', { method: 'POST', body: JSON.stringify(payload) });
                const json = await res.json();
                schedule = json.data;
                stats = json.stats;

                if (action !== 'clear_future') {
                    const nextPending = schedule.find(d => d.is_active && !d.completed && d.date >= todayStr);
                    if (nextPending) {
                        selectedDateStr = nextPending.date;
                        const fd = new Date(nextPending.date);
                        currentDate = new Date(fd.getFullYear(), fd.getMonth(), 1);
                    }
                } else selectedDateStr = todayStr;
                cardioChoice = "";
            } catch (e) { console.error(e); }

            actionLoading = false;
            renderApp();
        }

        function updateSelect(val) { cardioChoice = val; renderApp(); }
        function changeMonth(delta) { currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + delta, 1); renderApp(); }
        function selectDate(dateStr) { selectedDateStr = dateStr; renderApp(); }

        function renderApp() {
            if (!schedule) return;
            const root = document.getElementById('root');
            const selectedDayInfo = schedule.find(d => d.date === selectedDateStr);

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let firstDayIndex = new Date(year, month, 1).getDay() - 1;
            if (firstDayIndex === -1) firstDayIndex = 6;

            let blanksHtml = Array.from({ length: firstDayIndex }).map(() => `<div class="border-r border-b border-borderC bg-[#0a0a0a]/30"></div>`).join('');

            let daysHtml = '';
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const info = schedule.find(s => s.date === dateStr);
                const isSelected = selectedDateStr === dateStr;
                const isToday = todayStr === dateStr;

                let bgClass = "bg-panel";
                let typeColor = "text-accent";
                let glowTheme = "green"; // Default spotlight color

                // Duruma göre Arkaplan ve GLOW (Spotlight) Rengi!
                if (info && info.completed) {
                    if (info.skipped || info.type === 'Pas Geçildi') { bgClass = "bg-[#2E1010] border-transparent"; typeColor = "text-[#EF4444]"; glowTheme = "red"; }
                    else if (info.type === 'Rest') { bgClass = "bg-[#0c2445]"; typeColor = "text-[#60A5FA]"; glowTheme = "blue"; }
                    else { bgClass = "bg-[#0B2B16]"; typeColor = "text-[#00E676]"; glowTheme = "green"; }
                } else {
                    if (info?.type === 'Rest') { typeColor = "text-[#60A5FA]"; glowTheme = "blue"; }
                }
                if (isSelected) { bgClass = "bg-[#27272A]"; }

                let borderClass = isToday ? "border-accent border-[3px] shadow-[inset_0_0_20px_rgba(0,230,118,0.2)]" : "border-transparent border-2";
                if (isSelected && !isToday) borderClass = "border-white border-2";

                // data-glow BURADA ENTEGRE EDİLİYOR
                daysHtml += `
                <div onclick="selectDate('${dateStr}')" data-glow="${glowTheme}" class="${bgClass} border-r border-b border-borderC relative p-4 flex flex-col justify-between items-center cursor-pointer group rounded-xl m-1 transition-transform active:scale-95">
                    <div class="w-full text-right font-bold text-xs ${isToday ? 'text-accent' : 'text-[#71717A]'}">${isToday ? 'BUGÜN ' : ''}${d}</div>
                    ${info ? `<div class="font-black text-2xl xl:text-3xl tracking-tighter ${typeColor} mt-2 drop-shadow-lg">${info.type === 'Pas Geçildi' ? 'SKP' : info.type.toUpperCase()}</div>` : ''}
                    <div class="absolute inset-0 rounded-xl ${borderClass} pointer-events-none z-10"></div>
                </div>
            `;
            }

            const currentProg = Math.min(100, Math.floor((stats?.completed_weeks / 6) * 100));
            const h = now.getHours();
            let greeting = "İyi Geceler💤";
            if (h >= 5 && h < 12) greeting = "Günaydın☀️";
            else if (h >= 12 && h < 17) greeting = "Tünaydın🌤️";
            else if (h >= 17 && h < 22) greeting = "İyi Akşamlar🌙";

            const TR_DAY_INDEX = [6, 0, 1, 2, 3, 4, 5];
            const currentDayName = DAY_NAMES[TR_DAY_INDEX[now.getDay()]];
            const formattedDate = `${now.getDate()} ${MONTH_NAMES[now.getMonth()]} ${now.getFullYear()} - ${currentDayName}`;

            let rightPanelContent = `<div class="text-[#A1A1AA] italic text-center font-bold mt-10">Bu tarihte idman yok.</div>`;
            if (selectedDayInfo) {
                let optionsHtml = '';
                if (selectedDayInfo.type === 'E' && !selectedDayInfo.completed) {
                    optionsHtml = `
                <div class="mb-4 mt-auto">
                    <select onchange="updateSelect(this.value)" class="w-full bg-[#18181B] border border-[#27272A] text-white rounded-xl p-4 font-bold outline-none focus:border-accent" value="${cardioChoice}">
                        <option value="" ${cardioChoice === '' ? 'selected' : ''}>Kardiyo Türünü Seçin...</option>
                        <option value="Jogging" ${cardioChoice === 'Jogging' ? 'selected' : ''}>🏃‍♂️ Koşu</option>
                        <option value="Rowing" ${cardioChoice === 'Rowing' ? 'selected' : ''}>🚣‍♂️ Kürek</option>
                        <option value="Cycling" ${cardioChoice === 'Cycling' ? 'selected' : ''}>🚴‍♂️ Bisiklet</option>
                        <option value="Rucking" ${cardioChoice === 'Rucking' ? 'selected' : ''}>🎒 Rucking</option>
                        <option value="Swimming" ${cardioChoice === 'Swimming' ? 'selected' : ''}>🏊‍♂️ Yüzme</option>
                    </select>
                </div>`;
                }

                let buttonsHtml = '';
                if (selectedDayInfo.completed) {
                    let cx = selectedDayInfo.skipped || selectedDayInfo.type === 'Pas Geçildi' ? 'text-[#EF4444] bg-[#2E1010] border-red-900 border-2' : selectedDayInfo.type === 'Rest' ? 'text-blue-400 bg-[#0c2445] border-blue-900 border-2' : 'text-accent bg-[#0B2B16] border-green-900 border-2';
                    let tx = selectedDayInfo.skipped || selectedDayInfo.type === 'Pas Geçildi' ? 'PAS GEÇİLDİ' : 'TAMAMLANDI';
                    buttonsHtml = `<div class="w-full text-center py-5 rounded-xl font-black text-xl tracking-widest bg-opacity-80 backdrop-blur-sm ${cx} relative z-20">${tx}</div>`;
                } else {
                    buttonsHtml = `
                    <button onclick="handleAction('skip', '${selectedDayInfo.date}')" data-glow="red" class="flex-1 text-[#A1A1AA] hover:text-white font-black text-sm py-5 rounded-xl uppercase tracking-widest transition-transform bg-[#18181B] active:scale-95 border border-[#27272A] shadow-md relative z-20">KAYDIR</button>
                    <button onclick="handleAction('complete', ${selectedDayInfo.day_id})" data-glow="green" class="flex-1 bg-accent text-[#121212] font-black text-sm hover:opacity-90 py-5 rounded-xl uppercase tracking-widest ml-3 shadow-[0_4px_20px_rgba(0,230,118,0.2)] transition-transform active:scale-95 border-none relative z-20">ONAYLA</button>
                `;
                }

                rightPanelContent = `
                <div class="space-y-1 mb-8 relative z-20">
                    <div class="text-accent font-bold text-xs uppercase tracking-widest">${selectedDayInfo.is_active ? `Hafta ${selectedDayInfo.week}` : (selectedDayInfo.type === 'Pas Geçildi' ? 'ÇÖP GÜN' : 'SABİT DINLENME')}</div>
                    <div class="text-white font-black text-2xl tracking-tighter">${selectedDayInfo.date}</div>
                </div>
                <div class="text-4xl xl:text-5xl leading-none font-black mb-10 tracking-tighter uppercase relative z-20 ${selectedDayInfo.type === 'Rest' ? 'text-blue-400' : selectedDayInfo.type === 'Pas Geçildi' ? 'text-[#EF4444]' : 'text-accent'}">
                    ${selectedDayInfo.type === 'Pas Geçildi' ? 'SKP' : selectedDayInfo.type} <span class="text-white text-3xl">/ GÜNÜ</span>
                </div>
                ${selectedDayInfo.type !== 'Rest' && selectedDayInfo.type !== 'Pas Geçildi' ? `
                    <div class="text-[#71717A] font-bold text-[10px] mb-3 uppercase tracking-widest bg-[#27272A] p-2 rounded inline-block relative z-20">GÖREV LİSTESİ</div>
                    <div class="space-y-3 mb-10 pl-2 relative z-20">
                        ${selectedDayInfo.description.split(',').map(t => `<div class="flex text-white font-bold text-base xl:text-lg opacity-95"><span class="text-accent mr-3 mt-0.5">●</span> ${t.trim()}</div>`).join('')}
                    </div>
                    <div class="text-[#71717A] font-bold text-[10px] mb-3 uppercase tracking-widest bg-[#27272A] p-2 rounded inline-block relative z-20">HEDEF SEVİYE</div>
                    <div class="text-3xl font-black text-white tracking-widest mb-10 pl-2 opacity-90 relative z-20">${selectedDayInfo.reps}</div>
                ` : ''}
                ${optionsHtml}
                <div class="mt-auto pt-6 w-full flex">${buttonsHtml}</div>
            `;
            }

            root.innerHTML = `
            <div class="flex w-full h-full text-gray-100 p-[15px] gap-[15px] animate-fade-in bg-black">
                <div data-glow="panel" class="w-1/5 bg-[#131316] p-8 flex flex-col rounded-[1.5rem] border border-[#27272A] shadow-2xl">
                    <div class="text-accent font-black text-[2.7rem] tracking-tighter leading-none mb-6 relative z-20 mt-2">MASS<br/>PROTOCOL</div>
                    <div class="text-white font-bold text-xs mb-6 uppercase tracking-widest text-[#71717A] relative z-20">FAZ: BASE BUILDING</div>
                    <div class="mb-2 text-[#A1A1AA] font-bold text-xs uppercase tracking-widest relative z-20">İLERLEME: %${currentProg}</div>
                    <div class="w-full bg-[#27272A] h-2 rounded-full mb-10 overflow-hidden flex relative z-20"><div class="bg-accent h-full shadow-[0_0_10px_rgba(0,230,118,0.8)]" style="width: ${currentProg}%"></div></div>
                    <div class="bg-[#18181B] p-5 rounded-2xl mb-4 border border-[#27272A] relative z-20">
                        <div class="text-[#A1A1AA] text-[10px] font-bold mb-1 uppercase tracking-widest">Tamamlanan Tuğla</div><div class="text-white text-3xl font-black">${stats?.completed_weeks} HAFTA</div>
                    </div>
                    <div class="bg-[#18181B] p-5 rounded-2xl mb-4 border border-[#27272A] relative z-20">
                        <div class="text-[#A1A1AA] text-[10px] font-bold mb-1 uppercase tracking-widest">Kalan Program</div><div class="text-white text-3xl font-black">${stats?.weeks_remaining} HAFTA</div>
                    </div>
                    <div class="bg-[#18181B] p-5 rounded-2xl mb-4 border border-[#27272A] relative z-20">
                        <div class="text-[#A1A1AA] text-[10px] font-bold mb-1 uppercase tracking-widest">Pas Geçilen Gün</div><div class="text-3xl font-black ${stats?.skipped_days > 0 ? 'text-[#EF4444]' : 'text-white'}">${stats?.skipped_days} GÜN</div>
                    </div>
                    <button onclick="handleAction('clear_future')" data-glow="red" class="mt-auto w-full border border-[#27272A] bg-[#18181B] text-gray-400 font-bold text-xs py-4 flex items-center justify-center gap-2 rounded-xl uppercase tracking-widest relative z-20 transition-transform active:scale-95 shadow-md">
                        <span class="relative z-20 text-white block!">Geleceği Sıfırla</span><span class="text-lg relative z-20 block!">🗑️</span>
                    </button>
                </div>
                <div data-glow="panel" class="flex-1 flex flex-col rounded-[1.5rem] bg-panel border border-[#27272A] overflow-hidden">
                    <div class="flex justify-between items-center px-10 py-8 bg-[#18181B] border-b border-[#27272A] relative z-20">
                        <div class="flex-1 flex items-center"><button data-glow="blue" onclick="changeMonth(-1)" class="w-12 h-12 bg-black border border-[#27272A] rounded-xl text-accent font-bold transition-transform active:scale-90 relative z-20">◀</button></div>
                        <div class="flex-[2] text-center flex flex-col justify-center items-center">
                            <div class="text-accent font-bold text-sm tracking-widest mb-1 opacity-80">${greeting}</div>
                            <h2 class="text-4xl font-black uppercase text-white tracking-[0.2em]">${MONTH_NAMES[month]} ${year}</h2>
                            <div class="text-[#71717A] text-xs font-bold tracking-widest mt-1">BUGÜN: ${formattedDate}</div>
                        </div>
                        <div class="flex-1 flex justify-end"><button data-glow="blue" onclick="changeMonth(1)" class="w-12 h-12 bg-black border border-[#27272A] rounded-xl text-accent font-bold transition-transform active:scale-90 relative z-20">▶</button></div>
                    </div>
                    <div class="grid grid-cols-7 border-b border-[#27272A] bg-[#18181B] relative z-20">
                        ${DAY_NAMES.map(d => `<div class="text-center font-bold text-[#A1A1AA] text-xs tracking-widest py-3">${d}</div>`).join('')}
                    </div>
                    <div class="grid grid-cols-7 flex-1 overflow-y-auto custom-scrollbar auto-rows-fr relative z-20 bg-[#0F0F12] p-1">
                        ${blanksHtml}${daysHtml}
                    </div>
                </div>
                <div data-glow="panel" class="w-[28%] bg-panel p-8 rounded-[1.5rem] flex flex-col border border-[#27272A] shadow-2xl overflow-y-auto custom-scrollbar">
                    ${rightPanelContent}
                    ${actionLoading ? `<div class="absolute inset-0 bg-[#0a0a0a]/80 z-50 flex items-center justify-center rounded-2xl"><div class="w-12 h-12 border-4 border-accent border-t-transparent rounded-full animate-spin"></div></div>` : ''}
                </div>
            </div>
        `;
        }

        fetchData();
    </script>
</body>

</html>
